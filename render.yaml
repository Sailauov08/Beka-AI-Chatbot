services:
  - type: web
    name: beka-ai-chatbot
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash,gemini-2.0-flash-lite,gemini-1.5-flash
      - key: LAVA_API_KEY
        sync: false
      - key: LAVA_OFFER_ID_BASIC
        sync: false
      - key: LAVA_OFFER_ID_PRO
        sync: false
      - key: LAVA_WEBHOOK_API_KEY
        sync: false
      - key: LAVA_PERIODICITY
        value: MONTHLY
