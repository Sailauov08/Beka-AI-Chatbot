services:
  - type: web
    name: beka-ai-chatbot
    runtime: node
    plan: free
    buildCommand: npm run build && cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash,gemini-2.0-flash-lite,gemini-1.5-flash-8b
